<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e9; color: #2e7d32; }
        button { padding: 8px 16px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Product Management API Test</h1>
    
    <div class="test-section">
        <h3>Authentication Test</h3>
        <button onclick="testAuth()">Test Login</button>
        <div id="auth-result" class="result"></div>
    </div>

    <div class="test-section">
        <h3>Categories API Test</h3>
        <button onclick="testCategories()">Test Get Categories</button>
        <div id="categories-result" class="result"></div>
    </div>

    <div class="test-section">
        <h3>Products API Test</h3>
        <button onclick="testProducts()">Test Get Products</button>
        <div id="products-result" class="result"></div>
    </div>

    <div class="test-section">
        <h3>Frontend Component Test</h3>
        <button onclick="testFrontendAccess()">Test Frontend Access</button>
        <div id="frontend-result" class="result"></div>
    </div>

    <script>
        const BASE_URL = 'https://www.vivifysoft.in/VivifyReports';
        let authToken = '';

        async function testAuth() {
            const resultDiv = document.getElementById('auth-result');
            try {
                const response = await fetch(`${BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: 'admin', // Replace with actual admin credentials
                        password: 'admin123' // Replace with actual admin password
                    })
                });

                const data = await response.json();
                
                if (data.success && data.token) {
                    authToken = data.token;
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `✅ Login successful! User: ${data.user.name} (${data.user.role})`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `❌ Login failed: ${data.message}`;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `❌ Auth error: ${error.message}`;
            }
        }

        async function testCategories() {
            const resultDiv = document.getElementById('categories-result');
            
            if (!authToken) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Please login first';
                return;
            }

            try {
                const response = await fetch(`${BASE_URL}/api/categories`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                const data = await response.json();
                
                if (data.success) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `✅ Categories loaded: ${data.data.length} categories found<br>
                        <pre>${JSON.stringify(data.data, null, 2)}</pre>`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `❌ Categories failed: ${data.message}`;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `❌ Categories error: ${error.message}`;
            }
        }

        async function testProducts() {
            const resultDiv = document.getElementById('products-result');
            
            if (!authToken) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Please login first';
                return;
            }

            try {
                const response = await fetch(`${BASE_URL}/api/products`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                const data = await response.json();
                
                if (data.success) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `✅ Products loaded: ${data.data.length} products found<br>
                        <pre>${JSON.stringify(data.data, null, 2)}</pre>`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `❌ Products failed: ${data.message}`;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `❌ Products error: ${error.message}`;
            }
        }

        function testFrontendAccess() {
            const resultDiv = document.getElementById('frontend-result');
            
            // Check if we're accessing from the correct domain
            const currentUrl = window.location.href;
            const expectedDomain = 'vivifysoft.in';
            
            if (currentUrl.includes(expectedDomain)) {
                resultDiv.className = 'result success';
                resultDiv.innerHTML = `✅ Accessing from correct domain: ${currentUrl}`;
            } else {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `❌ Not accessing from expected domain. Current: ${currentUrl}`;
            }

            // Test localStorage access
            try {
                const testToken = localStorage.getItem('authToken');
                if (testToken) {
                    resultDiv.innerHTML += `<br>✅ Auth token found in localStorage`;
                } else {
                    resultDiv.innerHTML += `<br>⚠️ No auth token in localStorage`;
                }
            } catch (error) {
                resultDiv.innerHTML += `<br>❌ localStorage error: ${error.message}`;
            }
        }

        // Auto-test on page load
        window.onload = function() {
            testFrontendAccess();
        };
    </script>
</body>
</html>
