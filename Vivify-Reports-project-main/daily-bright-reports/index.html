<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SkyCity</title>
  <meta name="description" content="SkyCity property management application">
  <meta name="author" content="Vivify Technocrats" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/png" href="skycity-logo.png">
  <link rel="shortcut icon" href="skycity-logo.png">
  <meta property="og:title" content="SkyCity">
  <meta name="twitter:title" content="SkyCity">
  <meta property="og:description" content="SkyCity property management application">
  <meta name="twitter:description" content="SkyCity property management application">
  <!-- Apply cached theme color synchronously to prevent flash of wrong color -->
  <script>
    (function() {
      try {
        var color = localStorage.getItem('skycity_theme_color');
        if (color) {
          // Convert hex to HSL
          var c = color.replace('#','');
          if (c.length === 3) c = c.split('').map(function(x){return x+x;}).join('');
          var r = parseInt(c.substr(0,2),16)/255, g = parseInt(c.substr(2,2),16)/255, b = parseInt(c.substr(4,2),16)/255;
          var max = Math.max(r,g,b), min = Math.min(r,g,b), h=0, s=0, l=(max+min)/2;
          if (max !== min) {
            var d = max - min;
            s = l > 0.5 ? d/(2-max-min) : d/(max+min);
            if (max===r) h=((g-b)/d+(g<b?6:0))/6;
            else if (max===g) h=((b-r)/d+2)/6;
            else h=((r-g)/d+4)/6;
          }
          var hsl = Math.round(h*360)+' '+Math.round(s*100)+'% '+Math.round(l*100)+'%';
          document.documentElement.style.setProperty('--primary', hsl);
          document.documentElement.style.setProperty('--ring', hsl);
          document.documentElement.style.setProperty('--brand-primary', color);
        }
      } catch(e) {}
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
